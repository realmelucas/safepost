# SafeGuard 爱兔帮守岗系统 - Nginx 配置
# ==========================================
# 部署路径: /etc/nginx/sites-available/safeguard
# 启用: ln -s /etc/nginx/sites-available/safeguard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # 替换为实际域名或服务器 IP

    # 前端静态文件根目录
    root /opt/safeguard-web/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 静态资源缓存 (1年)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # favicon
    location = /favicon.svg {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API 代理到 FastAPI 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback - 所有非静态文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
